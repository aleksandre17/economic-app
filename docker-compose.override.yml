# Dev — auto-loaded with `docker compose up`
services:
  economic-app:
    build:
      target: development
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules   # node_modules container-ში რჩება
    environment:
      - VITE_API_URL=${VITE_API_URL}
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: rebuild
          path: package.json